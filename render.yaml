# render.yaml
services:
  - type: web
    runtime: docker
    name: recruitment-chatbot
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recruitment-db
          property: connectionString
      - key: ADMIN_TOKEN
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: STORAGE_BACKEND
        value: db_blob
      - key: DEFAULT_PHONE_REGION
        value: ES
      - key: TOP_N_NOTIFY
        value: "5"

databases:
  - name: volunteerm-db
    plan: free
    databaseName: volunteerm-db
