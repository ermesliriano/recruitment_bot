# render.yaml
services:
  - type: web
    runtime: docker
    name: recruitment-chatbot
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recruitment-db
          property: connectionString
      - key: ADMIN_TOKEN
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: STORAGE_BACKEND
        value: db_blob
      - key: DEFAULT_PHONE_REGION
        value: ES
      - key: TOP_N_NOTIFY
        value: "5"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_MESSAGING_SERVICE_SID
        sync: false
      - key: TWILIO_WHATSAPP_FROM_ADDRESS
        sync: false
      - key: TWILIO_WHATSAPP_DEFAULT_TEMPLATE_SID
        sync: false
      - key: TWILIO_WHATSAPP_DEFAULT_TEMPLATE_LANGUAGE
        value: es
      - key: WHATSAPP_DEFAULT_TENANT_SLUG
        sync: false

databases:
  - name: recruitment-db
    plan: free
    databaseName: recruitment_db_j1pp
    user: recruitment
